#
# Publish canonia to PyPI via Trusted Publishing (OIDC) — no API tokens.
# Triggered when a GitHub Release is published. The tag's version MUST match the
# version in pyproject.toml (checked below) so the release and the artifact agree.
#
# One-time PyPI setup (project owner, on pypi.org → canonia → Publishing):
#   add a pending publisher — owner: canonia, repo: canonia,
#   workflow: publish.yml, environment: pypi.
# See docs/releasing.md.
name: publish

on:
  release:
    types: [published]

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          pkg=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          tag="${GITHUB_REF_NAME#v}"
          echo "package=$pkg tag=$tag"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' does not match pyproject version '$pkg'"
            exit 1
          fi

      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi                 # matches the PyPI pending-publisher config
    permissions:
      id-token: write                 # OIDC token for Trusted Publishing
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
